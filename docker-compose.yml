services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: conversations-postgres
    environment:
      POSTGRES_USER: conversations
      POSTGRES_PASSWORD: conversations
      POSTGRES_DB: conversations
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conversations"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  llm-browser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-conversation-browser
    ports:
      - "${PORT:-5050}:5050"
    volumes:
      # Claude source projects (read-only) — where raw JSONL lives
      # Windows: ~ does not expand in Docker. Set CLAUDE_PROJECTS_DIR explicitly:
      #   set CLAUDE_PROJECTS_DIR=%USERPROFILE%\.claude\projects
      - ${CLAUDE_PROJECTS_DIR:-~/.claude/projects}:/data/claude-projects:ro
      # Raw synced JSONL files (read-write for sync step)
      - ./raw:/data/raw
      # Generated markdown files (read-write for conversion step)
      - ./markdown:/data/markdown
      # Codex sessions (read-only)
      - ${CODEX_SESSIONS_DIR:-~/.codex/sessions}:/data/codex-sessions:ro
      # Generated Codex markdown (read-write)
      - ./markdown_codex:/data/markdown_codex
      # Browser state (hidden items, persists across restarts)
      - ./browser_state:/data/state
      # Graphify concept graph output (generated externally via /graphify skill)
      - ./graphify-out:/data/graphify-out
    environment:
      - MARKDOWN_DIR=/data/markdown
      - RAW_DIR=/data/raw
      - CLAUDE_PROJECTS_SRC=/data/claude-projects
      - CODEX_SESSIONS_SRC=/data/codex-sessions
      - CODEX_MARKDOWN_DIR=/data/markdown_codex
      - STATE_DIR=/data/state
      - STATIC_DIR=/app/static
      - GRAPHIFY_OUT=/data/graphify-out
      - DATABASE_URL=postgresql+asyncpg://conversations:conversations@postgres:5432/conversations
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
