name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]
  workflow_dispatch:

# Per-ref concurrency: rapid pushes on the SAME branch cancel in-progress runs,
# but different branches build independently (dev, staging, main don't preempt
# each other).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint backend (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: browser/backend/requirements-dev.txt

      - name: Install dev dependencies
        working-directory: browser/backend
        run: pip install -r requirements-dev.txt

      - name: Ruff check
        working-directory: browser/backend
        run: ruff check .

  lint-frontend:
    name: Lint frontend (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: browser/frontend/package-lock.json

      - name: Install deps
        working-directory: browser/frontend
        run: npm ci --no-audit --no-fund

      - name: ESLint check
        working-directory: browser/frontend
        run: npm run lint

  test-backend:
    name: Test backend (pytest + pgvector testcontainer)
    runs-on: ubuntu-latest
    needs: lint-backend
    env:
      # Linux runners don't need the host.docker.internal override that the
      # local macOS Docker Desktop conftest assumes; localhost reaches the
      # sibling pgvector container directly.
      TESTCONTAINERS_RYUK_DISABLED: "true"
      TESTCONTAINERS_HOST_OVERRIDE: "localhost"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            browser/backend/requirements.txt
            browser/backend/requirements-dev.txt

      - name: Install system deps (libgomp1 for onnxruntime)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends libgomp1

      - name: Install Python deps
        working-directory: browser/backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Pre-pull pgvector image (warms testcontainer cache)
        run: docker pull pgvector/pgvector:pg16

      - name: Pytest with coverage gate
        working-directory: browser/backend
        # Phase 7.4 final: 100% coverage. Every line + branch of production
        # code is exercised by tests. The only pragma is load.py's
        # `if __name__ == "__main__":` bootstrap (exercised indirectly via a
        # direct call to main()).
        run: pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=100

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: browser/backend/coverage.xml
          if-no-files-found: ignore

  test-frontend:
    name: Test frontend (vitest + jsdom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: browser/frontend/package-lock.json

      - name: Install deps
        working-directory: browser/frontend
        run: npm ci --no-audit --no-fund

      - name: Vitest with coverage gate
        # Per-file thresholds configured in vitest.config.js. After Phase 7.3
        # decomposition, every component file plus all 9 custom hooks have
        # explicit thresholds. Total coverage ~92% lines / 93% branches.
        working-directory: browser/frontend
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: browser/frontend/coverage/
          if-no-files-found: ignore

  build-frontend:
    name: Build frontend (vite)
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: browser/frontend/package-lock.json

      - name: Install deps
        working-directory: browser/frontend
        run: npm ci --no-audit --no-fund

      - name: Vite build
        working-directory: browser/frontend
        run: npm run build

  docker-build:
    name: Docker build (multi-stage app image)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push — verification only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: conversations:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
